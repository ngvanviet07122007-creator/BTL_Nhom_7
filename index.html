<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogHub - Trang Chủ Bài Viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container py-2">
            <div>
                <a class="navbar-brand fs-3 mb-0" href="index.html">BlogHub</a>
                <div class="text-muted small">Nền tảng blog cá nhân tích hợp bình luận</div>
            </div>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active px-3 text-primary fw-bold border-bottom border-2 border-primary" href="index.html" id="navPublicLink">Public</a>
                <a class="nav-link px-3" href="admin.html">Admin</a>
            </div>
        </div>
    </nav>

    <div id="publicListView" class="container my-5">
        
        <div class="row g-3 mb-4 bg-white p-3 rounded-3 shadow-sm align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchBar" class="form-control bg-light border-start-0" placeholder="Tìm kiếm bài viết theo tiêu đề hoặc mô tả...">
                </div>
            </div>
            <div class="col-md-4">
                <select id="tagFilter" class="form-select bg-light">
                    </select>
            </div>
            <div class="col-md-3">
                <select id="sortFilter" class="form-select bg-light">
                    <option value="newest">Mới nhất trước</option>
                    <option value="oldest">Cũ nhất trước</option>
                </select>
            </div>
        </div>

        <div id="publicSpinner" class="text-center my-5" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2 small">Đang kết nối hệ thống dữ liệu MockAPI...</p>
        </div>

        <div id="publicPostGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            </div>
    </div>

    <div id="publicDetailView" class="container my-5" style="display:none;">
        <button id="btnBackToList" class="btn btn-outline-secondary mb-4 rounded-pill">
            <i class="bi bi-arrow-left"></i> Quay lại danh sách bài viết
        </button>

        <div class="row g-5">
            <div class="col-lg-8">
                <article id="detailArticleContent" class="bg-white p-4 rounded-3 shadow-sm">
                    </article>
            </div>

            <div class="col-lg-4">
                <div class="bg-white p-4 rounded-3 shadow-sm border border-light-subtle position-sticky" style="top: 20px;">
                    <h5 class="fw-bold text-dark mb-3"><i class="bi bi-chat-left-text"></i> Độc giả thảo luận (<span id="commentCount">0</span>)</h5>
                    
                    <div id="commentList" class="d-flex flex-column gap-3 mb-4" style="max-height:350px; overflow-y:auto; padding-right:5px;">
                        </div>

                    <div class="border-top pt-3">
                        <h6 class="fw-bold text-dark mb-3 small">Gửi bình luận của bạn</h6>
                        <form id="commentForm">
                            <input type="hidden" id="activePostId">
                            <div class="mb-3">
                                <label class="form-label small fw-medium">Tên hiển thị *</label>
                                <input type="text" id="cmtName" class="form-control" placeholder="Nhập tên biệt danh của bạn...">
                                <div class="invalid-feedback">Vui lòng điền tên hiển thị không để trống.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-medium">Nội dung ý kiến *</label>
                                <textarea id="cmtContent" class="form-control" rows="3" placeholder="Viết cảm nghĩ của bạn..."></textarea>
                                <div class="invalid-feedback">Vui lòng nhập nội dung ý kiến đóng góp.</div>
                            </div>
                            <button type="submit" id="btnSubmitComment" class="btn btn-purple px-4">Gửi bình luận</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
